{% extends "appdoku/index.html" %}
{% load static %}
{% block contenido %}

<section class=" container formulario-generar-tablero shadow mt-5 p-3">

    <div class="row">

        <div class="col p-3">
            <h2 class="text-center text-md-start display-5 fw-bold">Generar nuevo tablero</h2>
            <p class="text-center text-md-start">Lorem ipsum dolor sit amet consectetur, adipisicing elit.
                Eligendi assumenda, aliquid numquam molestias ex amet.

            <form action="{% url 'appdoku:generar' %}" method="post" class="row g-3">
                {% csrf_token %}

                <div class="form-floating col-md-4">
                    <input type="datetime" class="form-control" id="fecha-publicacion" placeholder="Fecha Publicacion"
                        value="{{ pub_date }}" readonly disabled>
                    <label for="fecha-publicacion">Fecha Publicación</label>
                </div>

                <fieldset class="d-flex col-md-4 justify-content-around align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1">
                        <label class="form-check-label" for="flexRadioDefault1">
                            Bajo
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2"
                            checked>
                        <label class="form-check-label" for="flexRadioDefault2">
                            Medio
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault3">
                        <label class="form-check-label" for="flexRadioDefault3">
                            Alto
                        </label>
                    </div>
                </fieldset>

                <div class="col-md-2 d-flex justify-content-center align-items-center">
                    <input type="submit" class="btn btn-dark btn-lg" value="Enviar">
                </div>
            </form>

        </div>

        {% endblock %}
